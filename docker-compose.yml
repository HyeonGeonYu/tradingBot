services:

  # ─── Signal bots ────────────────────────────────────────────────────────────

  signal-bybit:
    build: .
    restart: always
    command: python -m app.main
    env_file: .env
    environment:
      - STRATEGY=bybit
      - BYBIT_EXECUTOR_TARGETS=executor-a1:9009
    volumes:
      - ./logs:/app/logs
    depends_on:
      - executor-a1

  # S1(σ-복귀) 전략 — 큰틀 동일, strategy=s1. namespace "s1"로 장부 분리, executor-a1 공유.
  signal-s1:
    build: .
    restart: always
    command: python -m app.main
    env_file: .env
    environment:
      - STRATEGY=s1
      - S1_EXECUTOR_TARGETS=executor-a1:9009
    volumes:
      - ./logs:/app/logs
    depends_on:
      - executor-a1

  signal-mt5:
    build: .
    restart: always
    command: python -m app.main
    env_file: .env
    environment:
      - STRATEGY=mt5
      # executor-a2는 로컬 Windows에서 실행 → host.docker.internal로 접근
      - MT5_EXECUTOR_TARGETS=host.docker.internal:9010
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./logs:/app/logs

  # S1(σ-복귀) v2 — MT5. strategy=s1, namespace "mt5"(signal-mt5와 장부 공유, tag=S1 구분), executor-a2(9010) 공유.
  signal-s1-mt5:
    build: .
    restart: always
    command: python -m app.main
    env_file: .env
    environment:
      - STRATEGY=s1mt5
      - MT5_EXECUTOR_TARGETS=host.docker.internal:9010
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./logs:/app/logs

  # ─── Executors ──────────────────────────────────────────────────────────────

  executor-a1:
    build: .
    restart: always
    command: python -m app.local_executor
    env_file: .env
    environment:
      - EXEC_ACCOUNT_ID=${EXEC_A1_ACCOUNT_ID}
      - EXEC_LISTEN_HOST=0.0.0.0
    volumes:
      - ./logs:/app/logs

  # executor-a2 (MT5 주문)는 MetaTrader5 Python 라이브러리가 Windows 전용이라
  # Linux Docker에서 실행 불가 → 로컬 Windows PyCharm에서 직접 실행 유지
