# 신호봇 공용 healthcheck: /tmp/hb(메인루프 하트비트)가 90s 이상 stale이면 = 메인루프
# 행(hang) → exit 1(unhealthy) 보고. 실제 재기동은 autoheal 사이드카가 docker restart로
# 수행(컨테이너 PID1=python은 네임스페이스 내부 kill로 못 죽임 → 데몬측 restart 필요).
# $$ = compose 변수보간 회피(런타임 쉘에 $ 전달).
x-signal-healthcheck: &signal-hc
  test: ["CMD-SHELL", "AGE=$$(( $$(date +%s) - $$(stat -c %Y /tmp/hb 2>/dev/null || echo 0) )); [ \"$$AGE\" -lt 90 ]"]
  interval: 20s
  timeout: 10s
  retries: 3
  start_period: 120s

# autoheal이 감시할 라벨
x-autoheal-label: &autoheal-label
  autoheal: "true"

services:

  # ─── Signal bots ────────────────────────────────────────────────────────────

  signal-bybit:
    build: .
    restart: always
    healthcheck: *signal-hc
    labels: *autoheal-label
    command: python -m app.main
    env_file: .env
    environment:
      - STRATEGY=bybit
      - BYBIT_EXECUTOR_TARGETS=executor-a1:9009
    volumes:
      - ./logs:/app/logs
    depends_on:
      - executor-a1

  # S1(σ-복귀) 전략 — 큰틀 동일, strategy=s1. namespace "s1"로 장부 분리, executor-a1 공유.
  signal-s1:
    build: .
    restart: always
    healthcheck: *signal-hc
    labels: *autoheal-label
    command: python -m app.main
    env_file: .env
    environment:
      - STRATEGY=s1
      - S1_EXECUTOR_TARGETS=executor-a1:9009
    volumes:
      - ./logs:/app/logs
    depends_on:
      - executor-a1

  signal-mt5:
    build: .
    restart: always
    healthcheck: *signal-hc
    labels: *autoheal-label
    command: python -m app.main
    env_file: .env
    environment:
      - STRATEGY=mt5
      # executor-a2는 로컬 Windows에서 실행 → host.docker.internal로 접근
      - MT5_EXECUTOR_TARGETS=host.docker.internal:9010
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./logs:/app/logs

  # S1(σ-복귀) v2 — MT5. strategy=s1, namespace "mt5"(signal-mt5와 장부 공유, tag=S1 구분), executor-a2(9010) 공유.
  signal-s1-mt5:
    build: .
    restart: always
    healthcheck: *signal-hc
    labels: *autoheal-label
    command: python -m app.main
    env_file: .env
    environment:
      - STRATEGY=s1mt5
      - MT5_EXECUTOR_TARGETS=host.docker.internal:9010
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./logs:/app/logs

  # S2(추세 숏) — Bybit. strategy=s2, namespace "bybit" 공유, executor-a1.
  signal-s2:
    build: .
    restart: always
    healthcheck: *signal-hc
    labels: *autoheal-label
    command: python -m app.main
    env_file: .env
    environment:
      - STRATEGY=s2
      - S2_EXECUTOR_TARGETS=executor-a1:9009
    volumes:
      - ./logs:/app/logs
    depends_on:
      - executor-a1

  # S2(추세 숏) — MT5. strategy=s2, namespace "mt5" 공유, executor-a2(9010).
  signal-s2-mt5:
    build: .
    restart: always
    healthcheck: *signal-hc
    labels: *autoheal-label
    command: python -m app.main
    env_file: .env
    environment:
      - STRATEGY=s2mt5
      - MT5_EXECUTOR_TARGETS=host.docker.internal:9010
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./logs:/app/logs

  # ─── Watchdog ───────────────────────────────────────────────────────────────
  # unhealthy(=하트비트 stale=메인루프 행) 컨테이너를 docker restart로 자동 복구.
  # 라벨 autoheal=true 인 컨테이너만 대상. 데몬측 restart라 행된 PID1도 확실히 종료.
  autoheal:
    image: willfarrell/autoheal:latest
    restart: always
    environment:
      - AUTOHEAL_CONTAINER_LABEL=autoheal
      - AUTOHEAL_INTERVAL=10        # 10초마다 unhealthy 점검
      - AUTOHEAL_START_PERIOD=120   # 컨테이너 기동 후 120초는 유예
      - DOCKER_SOCK=/var/run/docker.sock
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  # ─── Executors ──────────────────────────────────────────────────────────────

  executor-a1:
    build: .
    restart: always
    command: python -m app.local_executor
    env_file: .env
    environment:
      - EXEC_ACCOUNT_ID=${EXEC_A1_ACCOUNT_ID}
      - EXEC_LISTEN_HOST=0.0.0.0
    volumes:
      - ./logs:/app/logs

  # executor-a2 (MT5 주문)는 MetaTrader5 Python 라이브러리가 Windows 전용이라
  # Linux Docker에서 실행 불가 → 로컬 Windows PyCharm에서 직접 실행 유지
